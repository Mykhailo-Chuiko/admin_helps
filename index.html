<!DOCTYPE html>
<html lang="uk">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Помічник адміністрації</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    display: flex;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    overflow: hidden;
}

.sidebar {
    width: 260px;
    padding: 20px;
    background: rgba(255, 255, 255, .06);
    backdrop-filter: blur(20px);
    border-right: 1px solid rgba(255, 255, 255, .1);
}

.logo {
    font-size: 24px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 35px;
}

.menu-btn {
    width: 100%;
    padding: 14px;
    margin-bottom: 12px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    font-size: 15px;
    color: white;
    background: rgba(255, 255, 255, .08);
    transition: .3s;
    text-align: left;
    padding-left: 20px;
}

.menu-btn:hover {
    transform: translateY(-2px);
    background: rgba(59, 130, 246, .6);
}

.active {
    background: linear-gradient(90deg, #3b82f6, #60a5fa);
}

.content {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 30px;
    overflow-y: auto;
}

.card {
    width: 550px;
    padding: 28px;
    border-radius: 28px;
    background: rgba(255, 255, 255, .08);
    backdrop-filter: blur(20px);
    box-shadow: 0 10px 40px rgba(0, 0, 0, .35);
    display: none;
}

.card.active-card {
    display: block;
}

.card h2 {
    text-align: center;
    margin-bottom: 22px;
}

.input-group {
    margin-bottom: 15px;
}

label {
    font-size: 14px;
    color: #cbd5e1;
    display: block;
    margin-bottom: 5px;
}

input,
select {
    width: 100%;
    padding: 15px;
    border: none;
    outline: none;
    border-radius: 14px;
    font-size: 16px;
    background: rgba(255, 255, 255, 0.08);
    color: white;
}

option {
    color: black;
}

.calc-btn {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    cursor: pointer;
    background: linear-gradient(90deg, #3b82f6, #60a5fa);
    color: white;
}

.error {
    display: none;
    margin-top: 15px;
    padding: 14px;
    border-radius: 14px;
    background: rgba(239, 68, 68, 0.2);
    border: 1px solid rgba(239, 68, 68, 0.4);
}

.result {
    display: none;
    margin-top: 15px;
}

.result-box {
    padding: 16px;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.05);
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.result-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 13px;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.04);
}

.result-main {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px;
    border-radius: 14px;
    background: rgba(59, 130, 246, 0.2);
    border: 1px solid rgba(59, 130, 246, 0.4);
    font-size: 18px;
}

.dev {
    font-size: 35px;
    opacity: .7;
    text-align: center;
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">Помічник</div>
    
    <button class="menu-btn active" onclick="switchTab('deposit', this)">
        💰 Калькулятор депозиту
    </button>
    <button class="menu-btn" onclick="switchTab('incassator', this)">
        🚚 Калькулятор інкасатора
    </button>
    <button class="menu-btn" onclick="switchTab('dev1', this)">
        🚧 В розробці
    </button>
    <button class="menu-btn" onclick="switchTab('dev2', this)">
        🚧 В розробці
    </button>
</div>

<div class="content" id="content">

    <div id="deposit-card" class="card active-card">
        <h2>Калькулятор депозиту</h2>
        
        <div class="input-group">
            <input id="amount" type="number" placeholder="Сума депозиту (₴)">
        </div>

        <div class="input-group">
            <select id="bankLevel">
                <option value="1.5">1 lvl (+1.5%)</option>
                <option value="3.5">2 lvl (+3.5%)</option>
                <option value="6.5">3 lvl (+6.5%)</option>
                <option value="10.5">4 lvl (+10.5%)</option>
                <option value="15.5">5 lvl (+15.5%)</option>
                <option value="21.5">6 lvl (+21.5%)</option>
                <option value="28.5">7 lvl (+28.5%)</option>
                <option value="36.5">8 lvl (+36.5%)</option>
                <option value="43.5">9 lvl (+43.5%)</option>
                <option value="50">10 lvl (+50%)</option>
            </select>
        </div>

        <div class="input-group">
            <select id="payday">
                <option value="0.06|5">5 PayDay — 0.06%</option>
                <option value="0.15|10">10 PayDay — 0.15%</option>
                <option value="0.3|20">20 PayDay — 0.3%</option>
                <option value="0.8|60">60 PayDay — 0.8%</option>
            </select>
        </div>

        <button class="calc-btn" onclick="calculateDeposit()">Розрахувати</button>
        <div id="deposit-error" class="error"></div>
        <div id="deposit-result" class="result"></div>
    </div>

    <div id="incassator-card" class="card">
        <h2>Калькулятор інкасатора</h2>
        
        <div class="input-group">
            <label>Поточний рівень банкінгу:</label>
            <select id="currentLevel" onchange="updateTargetOptions()">
                <option value="0">0 рівень</option>
                <option value="1">1 рівень</option>
                <option value="2">2 рівень</option>
                <option value="3">3 рівень</option>
                <option value="4">4 рівень</option>
                <option value="5">5 рівень</option>
                <option value="6">6 рівень</option>
                <option value="7">7 рівень</option>
                <option value="8">8 рівень</option>
                <option value="9">9 рівень</option>
            </select>
        </div>

        <div class="input-group">
            <label>Наявна кількість балів на цьому рівні:</label>
            <input id="currentPoints" type="number" value="0" min="0" placeholder="Введіть бали">
        </div>

        <div class="input-group">
            <label>Бажаний рівень банкінгу:</label>
            <select id="targetLevel">
                </select>
        </div>

        <div class="input-group">
            <label>Поточний рівень компанії:</label>
            <select id="companyLevel">
                <option value="1">1 рівень (1 бал за рейс)</option>
                <option value="3">2 рівень (3 бали за рейс)</option>
                <option value="5">3 рівень (5 балів за рейс)</option>
            </select>
        </div>

        <button class="calc-btn" onclick="calculateIncassator()">Розрахувати рейси</button>
        <div id="incassator-error" class="error"></div>
        <div id="incassator-result" class="result"></div>
    </div>

    <div id="dev-card" class="card">
        <div class="dev">🚧 В розробці</div>
    </div>

</div>

<script>
// Таблиця балів та лімітів
const incassatorData = {
    0: { pointsRequired: 30, limit: "5 000 000" },
    1: { pointsRequired: 60, limit: "10 000 000" },
    2: { pointsRequired: 120, limit: "15 000 000" },
    3: { pointsRequired: 180, limit: "20 000 000" },
    4: { pointsRequired: 240, limit: "25 000 000" },
    5: { pointsRequired: 360, limit: "30 000 000" },
    6: { pointsRequired: 500, limit: "35 000 000" },
    7: { pointsRequired: 650, limit: "40 000 000" },
    8: { pointsRequired: 800, limit: "50 000 000" },
    9: { pointsRequired: 1000, limit: "60 000 000" },
    10: { pointsRequired: 0, limit: "75 000 000" }
};

// Ініціалізація вибору рівнів при завантаженні сторінки
updateTargetOptions();

function switchTab(tabName, btn) {
    document.querySelectorAll(".menu-btn").forEach(x => x.classList.remove("active"));
    document.querySelectorAll(".card").forEach(x => x.classList.remove("active-card"));
    btn.classList.add("active");

    if (tabName === 'deposit') {
        document.getElementById("deposit-card").classList.add("active-card");
    } else if (tabName === 'incassator') {
        document.getElementById("incassator-card").classList.add("active-card");
    } else {
        document.getElementById("dev-card").classList.add("active-card");
    }
}

// Функція оновлення вибору бажаного рівня (лише назва рівня без лімітів)
function updateTargetOptions() {
    const currentLvl = parseInt(document.getElementById("currentLevel").value);
    const targetSelect = document.getElementById("targetLevel");
    targetSelect.innerHTML = "";

    for (let i = currentLvl + 1; i <= 10; i++) {
        let opt = document.createElement("option");
        opt.value = i;
        opt.innerText = `${i} рівень`;
        targetSelect.appendChild(opt);
    }
}

// РОЗРАХУНОК ДЕПОЗИТУ
function calculateDeposit() {
    let amount = Number(document.getElementById("amount").value);
    let error = document.getElementById("deposit-error");
    let result = document.getElementById("deposit-result");

    error.style.display = "none";
    result.style.display = "none";

    if (amount < 1) {
        error.innerText = "Мінімальна сума: 1₴";
        error.style.display = "block";
        return;
    }
    if (amount > 5000000) {
        error.innerText = "Максимальна сума: 5 000 000₴";
        error.style.display = "block";
        return;
    }

    let data = document.getElementById("payday").value.split("|");
    let basePercent = Number(data[0]);
    let payday = Number(data[1]);
    let bankBonus = Number(document.getElementById("bankLevel").value);

    let finalPercent = basePercent * (1 + bankBonus / 100);
    let final = amount * Math.pow(1 + (finalPercent / 100), payday);
    let profit = final - amount;

    result.innerHTML = `
        <div class="result-box">
            <div class="result-item"><span>💰 Початкова сума</span><b>${amount.toLocaleString()}₴</b></div>
            <div class="result-item"><span>📊 Бонус рівня банку</span><b>+${bankBonus}%</b></div>
            <div class="result-item"><span>📈 Чистий прибуток</span><b>+${Math.round(profit).toLocaleString()}₴</b></div>
            <div class="result-main"><span>🏦 Через ${payday} PayDay:</span><b>${Math.round(final).toLocaleString()}₴</b></div>
        </div>
    `;
    result.style.display = "block";
}

// РОЗРАХУНОК ІНКАСАТОРА
function calculateIncassator() {
    const currentLvl = parseInt(document.getElementById("currentLevel").value);
    const currentPoints = parseInt(document.getElementById("currentPoints").value) || 0;
    const targetLvl = parseInt(document.getElementById("targetLevel").value);
    const pointsPerRun = parseInt(document.getElementById("companyLevel").value);

    const error = document.getElementById("incassator-error");
    const result = document.getElementById("incassator-result");

    error.style.display = "none";
    result.style.display = "none";

    // Валідація наявних балів на поточному рівні
    const maxPointsForCurrentLvl = incassatorData[currentLvl].pointsRequired;
    if (currentPoints < 0) {
        error.innerText = "Кількість балів не може бути меншою за 0";
        error.style.display = "block";
        return;
    }
    if (currentPoints >= maxPointsForCurrentLvl && currentLvl < 10) {
        error.innerText = `На ${currentLvl} рівні не може бути більше ніж ${maxPointsForCurrentLvl - 1} балів (при ${maxPointsForCurrentLvl} балах рівень підвищується автоматично)`;
        error.style.display = "block";
        return;
    }

    // Розрахунок балів, які потрібно набрати з урахуванням обнулення
    let totalPointsNeeded = 0;
    
    // Скільки залишилося добити на поточному рівні
    totalPointsNeeded += (maxPointsForCurrentLvl - currentPoints);

    // Додаємо повну вартість прокачки для всіх наступних рівнів до цілі
    for (let i = currentLvl + 1; i < targetLvl; i++) {
        totalPointsNeeded += incassatorData[i].pointsRequired;
    }

    // Розрахунок потрібної кількості рейсів з округленням вгору
    let runsRequired = Math.ceil(totalPointsNeeded / pointsPerRun);

    result.innerHTML = `
        <div class="result-box">
            <div class="result-item">
                <span>🎯 Цільовий рівень банкінгу</span>
                <b>${targetLvl} lvl</b>
            </div>
            <div class="result-item">
                <span>💳 Новий ліміт (грн/од)</span>
                <b>${incassatorData[targetLvl].limit} ₴</b>
            </div>
            <div class="result-item">
                <span>📈 Всього потрібно балів</span>
                <b>${totalPointsNeeded} балів</b>
            </div>
            <div class="result-main">
                <span>🚚 Потрібно виконати рейсів</span>
                <b>${runsRequired} рейсів</b>
            </div>
        </div>
    `;
    result.style.display = "block";
}
</script>

</body>
</html>
